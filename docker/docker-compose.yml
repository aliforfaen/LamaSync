services:
  lamasync-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: lamasync/lamasync-server:0.1.0
    container_name: lamasync-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LAMASYNC_DATA_DIR: /data
      LAMASYNC_BACKUP_DIR: /backups
      # LAMASYNC_API_KEY is required — set it in .env (the env_file above)
      # PORT defaults to 8080 inside the image.
    ports:
      # Replace 100.64.0.1 with the server's actual tailnet IP, or remove the
      # IP prefix to publish on all host interfaces. The tailnet form avoids
      # exposing the API to the LAN.
      - "100.64.0.1:8080:8080"
    volumes:
      - lamasync-data:/data
      - lamasync-backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Authorization: Bearer ${LAMASYNC_API_KEY}", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lamasync-data:
  lamasync-backups:
