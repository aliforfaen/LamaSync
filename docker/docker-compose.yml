services:
  lamasync-server:
    image: ${LAMASYNC_IMAGE:-ghcr.io/aliforfaen/lamasync-server:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: lamasync-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LAMASYNC_DATA_DIR: /data
      LAMASYNC_BACKUP_DIR: /backups
      # LAMASYNC_API_KEY is required — set it in .env (the env_file above)
      # PORT defaults to 8080 inside the image.
    ports:
      # Default to all interfaces so Tailscale/LAN can reach the server.
      # Override with LAMASYNC_HOST_IP=127.0.0.1 for local-only testing.
      - "${LAMASYNC_HOST_IP:-0.0.0.0}:8080:8080"
    volumes:
      - lamasync-data:/data
      - lamasync-backups:/backups
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Authorization: Bearer ${LAMASYNC_API_KEY}", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lamasync-data:
  lamasync-backups:
