services:
  server:
    image: ghcr.io/aliforfaen/lamasync-server:${LAMASYNC_SERVER_TAG:-v0.2.1}
    container_name: lamasync-server-sandbox
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      LAMASYNC_API_KEY: ${LAMASYNC_API_KEY:-sandbox-api-key}
      LAMASYNC_DATA_DIR: /data
      LAMASYNC_BACKUP_DIR: /backups
      PORT: "8080"
    volumes:
      - server-data:/data
      - server-backups:/backups
    ports:
      - "8080:8080"

  client:
    build:
      context: ../..
      dockerfile: scripts/e2e-sandbox/client.Dockerfile
      network: host
    container_name: lamasync-client-sandbox
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      LAMASYNC_SERVER_URL: http://server:8080
      LAMASYNC_API_KEY: ${LAMASYNC_API_KEY:-sandbox-api-key}
      LAMASYNC_SOCKET_PATH: /home/testuser/lamasync.sock
    volumes:
      - client-data:/home/testuser/test-data
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-data:
  server-backups:
  client-data:
