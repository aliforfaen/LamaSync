name: ci

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2


      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: lamasync-server
          path: packages/server/dist/lamasync-server
          if-no-files-found: error

      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: lamasyncd
          path: packages/daemon/dist/lamasyncd
          if-no-files-found: error

      - name: Upload tui binary
        uses: actions/upload-artifact@v4
        with:
          name: lamasync-tui
          path: packages/tui/dist/lamasync-tui
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - name: Download server binary
        uses: actions/download-artifact@v4
        with:
          name: lamasync-server
          path: dist/lamasync-server

      - name: Download daemon binary
        uses: actions/download-artifact@v4
        with:
          name: lamasyncd
          path: dist/lamasyncd

      - name: Download tui binary
        uses: actions/download-artifact@v4
        with:
          name: lamasync-tui
          path: dist/lamasync-tui

      - name: Make binaries executable
        run: chmod +x dist/lamasync-server/lamasync-server dist/lamasyncd/lamasyncd dist/lamasync-tui/lamasync-tui

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lamasync-server/lamasync-server
            dist/lamasyncd/lamasyncd
            dist/lamasync-tui/lamasync-tui
          generate_release_notes: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lamasync-server:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/lamasync-server:latest